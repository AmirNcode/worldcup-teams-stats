<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="FIFA World Cup 2026 — live group standings, team stats, schedule in your time zone, knockout bracket and Golden Boot tracker." />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/png" href="./icon-192.png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>World Cup 2026 — Teams & Stats</title>
  </head>
  <body>
    <div id="root"></div>
    <!--
      Static form so Netlify Forms detects "feedback" at build time. The real
      form is rendered by React and submitted via fetch; field names must match.
    -->
    <form name="feedback" netlify netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="feedback" />
      <select name="feedback-type">
        <option>Report bug</option>
        <option>Feature request</option>
        <option>General feedback</option>
      </select>
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
